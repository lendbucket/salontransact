  parameters:
    IdempotencyKey:
      schema:
        $ref: '#/components/schemas/IdempotencyKey'
      required: true
      name: Idempotency-Key
      in: header
      description: >-
        A UUID v4 unique to this logical request. Reyna Pay caches the response for 7 days.
        Replaying the same key with an identical body returns the cached response. Replaying with a
        different body returns 409 idempotency_conflict. Generate a fresh UUID for every distinct
        logical action; reuse the same UUID when retrying the same action.
paths:
  /api/v1/health:
    get:
      summary: Health check
      description: >-
        Returns the engine's liveness status. Does not require authentication. Use this endpoint for
        uptime monitoring and to verify the engine is reachable.
      tags:
        - Health
      responses:
        '200':
          description: Engine is healthy and accepting requests.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/charges:
    get:
      summary: List charges
      description: >-
        Returns a paginated list of charges, ordered by creation time descending. Supports filtering
        by status, customer, stylist, booking, and date range. Uses cursor-based pagination — pass
        `next_cursor` from a previous response to fetch the next page.
      tags:
        - Charges
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: integer
            minimum: 1
            maximum: 200
            description: Page size. Default 50, max 200.
          required: false
          description: Page size. Default 50, max 200.
          name: limit
          in: query
        - schema:
            type: string
            enum:
              - succeeded
              - failed
              - requires_capture
              - refunded
          required: false
          name: status
          in: query
        - schema:
            type: string
          required: false
          name: customer_id
          in: query
        - schema:
            type: string
          required: false
          name: stylist_id
          in: query
        - schema:
            type: string
          required: false
          name: booking_id
          in: query
        - schema:
            type: string
            format: date-time
            description: ISO 8601 lower bound (inclusive).
          required: false
          description: ISO 8601 lower bound (inclusive).
          name: from
          in: query
        - schema:
            type: string
            format: date-time
            description: ISO 8601 upper bound (inclusive).
          required: false
          description: ISO 8601 upper bound (inclusive).
          name: to
          in: query
        - schema:
            type: string
            description: Opaque cursor from a previous response.
          required: false
          description: Opaque cursor from a previous response.
          name: cursor
          in: query
      responses:
        '200':
          description: List of charges with pagination metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChargeListResponse'
        '401':
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a charge
      description: >-
        Charges a payment source. Supports saved cards (saved_card) and freshly tokenized cards from
        Hosted Fields (single_use_token). On success returns the Charge object with status
        'succeeded' (or 'requires_capture' if capture: false was sent). On card decline returns 422
        with payment_failed error code.
      tags:
        - Charges
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: Idempotency-Key
          in: header
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChargeCreateRequest'
      responses:
        '201':
          description: Charge succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Charge'
        '401':
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Idempotency conflict — same key replayed with different body.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error or card declined.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/charges/{id}:
    get:
      summary: Retrieve a charge
      description: >-
        Returns the Charge object for the given ID. Accepts both `ch_<id>` (full prefixed ID) and
        bare `<id>` formats.
      tags:
        - Charges
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
            example: ch_clx7y8z9a0001b2c3d4e5f6g7
          required: true
          name: id
          in: path
      responses:
        '200':
          description: Charge found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Charge'
        '401':
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Charge not found or not owned by this merchant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/charges/{id}/capture:
    post:
      summary: Capture an auth-only charge
      description: >-
        Captures funds for a charge that was created with capture: false. Optional partial capture
        by sending amount_cents less than the original auth. Returns the updated Charge with status
        'succeeded'.
      tags:
        - Charges
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
          required: true
          name: id
          in: path
        - schema:
            type: string
            format: uuid
          required: true
          name: Idempotency-Key
          in: header
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureCreateRequest'
      responses:
        '200':
          description: Capture succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Charge'
        '401':
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Charge not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Capture failed (e.g., already captured, expired, decline).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/charges/{id}/refund:
    post:
      summary: Refund a charge
      description: >-
        Refunds part or all of a previous charge. If amount_cents is omitted, refunds the full
        remaining unrefunded amount. Multiple partial refunds are allowed up to the original charge
        amount.
      tags:
        - Charges
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
          required: true
          name: id
          in: path
        - schema:
            type: string
            format: uuid
          required: true
          name: Idempotency-Key
          in: header
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefundCreateRequest'
      responses:
        '201':
          description: Refund succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Refund'
        '401':
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Charge not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Refund failed (e.g., over-refund, payroc rejection).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/charges/{id}/void:
    post:
      summary: Void an auth-only charge
      description: >-
        Voids a charge that has not yet been captured. Use this instead of refund for charges in
        'requires_capture' status — voiding releases the auth hold without creating a refund record.
        After capture, use refund instead.
      tags:
        - Charges
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
          required: true
          name: id
          in: path
        - schema:
            type: string
            format: uuid
          required: true
          name: Idempotency-Key
          in: header
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoidCreateRequest'
      responses:
        '200':
          description: Void succeeded.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Void'
        '401':
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Charge not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Void failed (e.g., already captured — use refund instead).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/tokenization/sessions:
    post:
      summary: Create a Hosted Fields tokenization session
      description: >-
        Creates a short-lived session token + SDK config bundle for client-side card tokenization
        via Payroc Hosted Fields. The merchant calls this server-side, then passes the response to
        the browser to initialize Payroc.hostedFields(). Card data flows directly from the
        customer's browser to Payroc — never touches your server.
      tags:
        - Tokenization
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenizationSessionCreateRequest'
      responses:
        '200':
          description: Tokenization session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenizationSession'
        '401':
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Failed to create session (e.g., Payroc unreachable).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/customers:
