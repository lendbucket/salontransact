    get:
      summary: Retrieve a saved card
      description: Returns a single saved card. ID accepts both `card_<id>` and bare `<id>` formats.
      tags:
        - Cards
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
          required: true
          name: id
          in: path
      responses:
        '200':
          description: Card found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Card'
        '401':
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Card not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Revoke a saved card
      description: >-
        Deletes the saved payment method. The Payroc secureToken is deleted on the processor side
        FIRST; only after Payroc confirms (or returns 404) is the local row marked revoked. This
        prevents drift between local state and Payroc state. If Payroc is unreachable, returns 502
        and the card is NOT revoked locally — retry later.
      tags:
        - Cards
      security:
        - bearerAuth: []
      parameters:
        - schema:
            type: string
          required: true
          name: id
          in: path
      responses:
        '200':
          description: Card revoked.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardDeleteResponse'
        '401':
          description: Missing or invalid API key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Card not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Card already revoked or expired.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Payroc deletion failed; card remains active locally — retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
